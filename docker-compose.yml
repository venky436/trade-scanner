services:
  backend:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: trading-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      KITE_API_KEY: ${KITE_API_KEY}
      KITE_API_SECRET: ${KITE_API_SECRET}
      KITE_ACCESS_TOKEN: ${KITE_ACCESS_TOKEN:-}
      MARKET_MODE: ${MARKET_MODE:-commodity}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/trading_scanner
    volumes:
      - backend_data:/app/apps/server/data
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000/ws}
    container_name: trading-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:17
    container_name: trading-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: trading_scanner
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  backend_data:
